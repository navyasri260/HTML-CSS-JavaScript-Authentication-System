<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <!-- ✅ Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(15px);
      padding: 35px;
      border-radius: 15px;
      text-align: center;
      width: 320px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      color: white;

      /* ✅ Animation added correctly */
      animation: fadeIn 0.6s ease-in-out;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    input:focus {
      outline: 2px solid #ffffff;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #ffffff;
      color: #764ba2;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: #ddd;
    }

    a {
      color: #fff;
      text-decoration: underline;
    }

    p {
      margin-top: 15px;
    }

    /* ✅ Animation keyframes */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <p>Don't have account? <a href="register.html">Register</a></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBo4_K6b87kIeWoorq1gi_N41PUyUcacLI",
      authDomain: "userauthsystem-3546f.firebaseapp.com",
      projectId: "userauthsystem-3546f",
      storageBucket: "userauthsystem-3546f.firebasestorage.app",
      messagingSenderId: "465812955303",
      appId: "1:465812955303:web:5f72450c99a63fc7943b82"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.login = function() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      signInWithEmailAndPassword(auth, email, password)
        .then(() => {
          alert("Login Successful");
          window.location.href = "index.html";
        })
        .catch(err => alert(err.message));
    }
  </script>

</body>
</html>
