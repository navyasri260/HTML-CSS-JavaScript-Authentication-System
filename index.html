<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <!-- ✅ Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: white;
    }

    .container {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(15px);
      padding: 40px;
      border-radius: 15px;
      text-align: center;
      width: 350px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);

      /* ✅ Animation */
      animation: fadeIn 0.6s ease-in-out;
    }

    h2 {
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 20px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #ff4d4d;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: #ff1a1a;
    }

    /* ✅ Animation keyframes */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Welcome 🎉</h2>
    <p>You are successfully logged in</p>
    <button onclick="logout()">Logout</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBo4_K6b87kIeWoorq1gi_N41PUyUcacLI",
      authDomain: "userauthsystem-3546f.firebaseapp.com",
      projectId: "userauthsystem-3546f",
      storageBucket: "userauthsystem-3546f.firebasestorage.app",
      messagingSenderId: "465812955303",
      appId: "1:465812955303:web:5f72450c99a63fc7943b82"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "login.html";
      }
    });

    window.logout = function() {
      signOut(auth).then(() => {
        alert("Logged out");
        window.location.href = "login.html";
      });
    }
  </script>

</body>
</html>
