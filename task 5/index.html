<!DOCTYPE html>
<html>
<head>
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h2>Tic Tac Toe</h2>

    <div class="board">
      <div class="cell" onclick="play(this)"></div>
      <div class="cell" onclick="play(this)"></div>
      <div class="cell" onclick="play(this)"></div>
      <div class="cell" onclick="play(this)"></div>
      <div class="cell" onclick="play(this)"></div>
      <div class="cell" onclick="play(this)"></div>
      <div class="cell" onclick="play(this)"></div>
      <div class="cell" onclick="play(this)"></div>
      <div class="cell" onclick="play(this)"></div>
    </div>

    <h3 id="status">Player X Turn</h3>
    <button onclick="resetGame()">Reset</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
